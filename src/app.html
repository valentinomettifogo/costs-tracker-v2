<!doctype html>
<html lang="en" style="background-color:#f3f4f6">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="text-scale" content="scale" />
		<title>Budget – Track shared expenses</title>
		<meta name="description" content="Track and manage shared expenses with your group, effortlessly." />
		<meta name="theme-color" content="#41b883" />
		<link rel="icon" href="/icons/favicon.svg" type="image/svg+xml" />
		<link rel="icon" href="/icons/favicon.ico" sizes="any" />
		<link rel="icon" href="/icons/favicon-96x96.png" type="image/png" sizes="96x96" />
		<link rel="manifest" href="/site.webmanifest" />
		<!-- PWA capability -->
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
		<!-- iOS PWA -->
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="Budget" />
		<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
		<link rel="preload" as="image" href="/icons/web-app-manifest-192x192.png" />
		<meta property="og:title" content="Budget" />
		<meta property="og:description" content="Track and manage shared expenses with your group, effortlessly." />
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://budget.valentinomettifogo.com" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<!-- Fonts load async so they never block first paint of the splash screen -->
		<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" />
		<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
		<noscript><link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet" /></noscript>
		<style>
			#app-loading {
				position: fixed; inset: 0; z-index: 9999;
				display: flex; flex-direction: column; align-items: center; justify-content: center;
				gap: 20px; background: #f3f4f6;
				transition: opacity 0.25s ease;
			}
			#app-loading.fade-out { opacity: 0; pointer-events: none; }
			@keyframes _spin { to { transform: rotate(360deg); } }
			#app-loading .spinner {
				width: 36px; height: 36px; border-radius: 50%;
				border: 3px solid #e5e7eb; border-top-color: #41b883;
				animation: _spin 0.7s linear infinite;
			}
		</style>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div id="app-loading">
			<img src="/icons/web-app-manifest-192x192.png" alt="" width="80" height="80"
				style="border-radius:20px;box-shadow:0 4px 24px rgba(0,0,0,0.10);pointer-events:none;" />
			<div class="spinner"></div>
		</div>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
